<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Ramen Yozora</title>
    <style>
        /* CSS Reset & Variabel Global */
        :root {
            --primary: #d94f27;
            --dark: #121212;
            --darker: #0a0a0a;
            --light: #fef1e6;
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --danger: #dc3545;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body {
            font-family: var(--font-main);
            background-color: var(--dark);
            color: var(--light);
            overflow: hidden; /* Mencegah scroll di halaman login */
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Latar Belakang & Partikel */
        .bg-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 18, 18, 0.8), rgba(10, 10, 10, 0.95)), 
                        url('https://images.unsplash.com/photo-1552611052-33e04de081de?q=80&w=1964&auto=format&fit=crop') center/cover no-repeat fixed;
            z-index: 1;
        }

        #particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* Container Form Login */
        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            perspective: 1000px;
        }

        .login-box {
            background: rgba(26, 26, 26, 0.85);
            backdrop-filter: blur(15px);
            padding: 50px 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 20px rgba(217, 79, 39, 0.1);
            transform: translateY(30px);
            opacity: 0;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .logo {
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            color: var(--light);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .logo span { color: var(--primary); }

        .subtitle {
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* Form Styling */
        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #d1d1d1;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-control {
            width: 100%;
            padding: 15px;
            background: rgba(18, 18, 18, 0.8);
            border: 1px solid #333;
            border-radius: 10px;
            color: var(--light);
            font-size: 1rem;
            font-family: var(--font-main);
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(217, 79, 39, 0.2);
        }

        .btn {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--light);
            background: var(--primary);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        .btn:hover {
            background: #b83d1c;
            box-shadow: 0 0 20px rgba(217, 79, 39, 0.4);
            transform: translateY(-2px);
        }

        /* Pesan Error */
        .error-msg {
            display: none;
            background: rgba(220, 53, 69, 0.1);
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        /* Animasi */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
            opacity: 1; /* Tambahan baris ini mencegah form menghilang (kembali ke opacity 0) */
        }

    </style>
</head>
<body>

    <!-- Background & Efek Uap -->
    <div class="bg-container"></div>
    <canvas id="particles"></canvas>

    <!-- Form Login -->
    <div class="login-wrapper">
        <div class="login-box" id="loginBox">
            <div class="logo">Yozo<span>ra.</span></div>
            <p class="subtitle">Sistem Manajemen Admin</p>

            <div class="error-msg" id="errorMsg"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Masukkan username" required autocomplete="off">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Masukkan password" required>
                </div>

                <button type="submit" class="btn">Masuk</button>
            </form>
        </div>
    </div>

    <script>
        // --- 1. Logika Autentikasi Form Login ---
        const loginForm = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');
        const loginBox = document.getElementById('loginBox');

        loginForm.addEventListener('submit', function(event) {
            event.preventDefault(); // Mencegah form reload halaman
            
            // Tambahkan trim() untuk mencegah spasi tidak sengaja ikut terbaca
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();

            // Validasi kredensial statis
            if (user === 'admin' && pass === 'admin') {
                // Sembunyikan error jika sebelumnya tampil
                errorMsg.style.display = 'none';
                
                // Animasi berhasil: tombol berubah teks
                const btn = loginForm.querySelector('button');
                btn.innerHTML = 'Memuat...';
                btn.style.background = '#28a745'; // warna hijau sukses
                btn.style.boxShadow = '0 0 20px rgba(40, 167, 69, 0.4)';

                // Mengarahkan ke file dashboard.html
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 800);
                
            } else {
                // Tentukan pesan error yang lebih spesifik menggunakan innerHTML
                if (user !== 'admin' && pass !== 'admin') {
                    errorMsg.innerHTML = 'Username dan Password <strong>salah!</strong>';
                } else if (user !== 'admin') {
                    errorMsg.innerHTML = 'Username <strong>tidak ditemukan!</strong>';
                } else if (pass !== 'admin') {
                    errorMsg.innerHTML = 'Password yang Anda masukkan <strong>salah!</strong>';
                }

                // Tampilkan pesan error secara eksplisit
                errorMsg.style.display = 'block';
                
                // Menghapus dan menambahkan class untuk memicu ulang animasi shake
                loginBox.classList.remove('shake');
                void loginBox.offsetWidth; // Trigger reflow
                loginBox.classList.add('shake');
                
                // Kosongkan input password
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        });

        // --- 2. Logika Particle System (Efek Uap Panas) ---
        // Digunakan untuk menjaga konsistensi tema sinematik dari halaman depan
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();

        let particlesArray = [];
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1; 
                this.speedY = Math.random() * -1.5 - 0.2; 
                this.speedX = Math.random() * 0.5 - 0.25; 
                this.opacity = Math.random() * 0.4 + 0.1;
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                if (this.y < 0) {
                    this.y = canvas.height;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.fillStyle = `rgba(255, 180, 100, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particlesArray = [];
            let numberOfParticles = (canvas.width * canvas.height) / 8000; // Dikurangi sedikit agar form tetap fokus
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();

        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles();
        });
    </script>
</body>
</html>
